name: 기능 요청 (Feature Request)
description: 새로운 기능이나 개선 아이디어를 제안해주세요.
title: "[FEATURE] "
labels: [enhancement]
assignees: []

body:
  - type: dropdown
    id: layer
    attributes:
      label: 🗂️ 관련 레이어
      description: 기능이 추가될 레이어를 선택해주세요.
      options:
        - Frontend
        - Server
        - 전체 연동
        - 기타 / 해당 없음
    validations:
      required: true

  - type: dropdown
    id: domain
    attributes:
      label: 🧩 관련 도메인
      options:
        - auth
        - 메인
        - 서재
        - 친구
        - 설정
        - UI / 퍼블리싱
        - 기타 / 해당 없음
    validations:
      required: true

  - type: textarea
    id: feature-description
    attributes:
      label: 🌟 기능 설명
      description: 원하는 기능이 무엇인지 명확하게 설명해주세요.
      placeholder: 예) 모바일 화면에서 홈페이지 메뉴 변화
    validations:
      required: true

  - type: textarea
    id: why-needed
    attributes:
      label: 📌 필요 이유
      description: 이 기능이 왜 필요한지, 어떤 문제를 해결하는지 작성해주세요.
      placeholder: 예) 기존 웹사이트의 모바일 가독성이 좋지 않기 때문에 해당 기능이 필요합니다.
    validations:
      required: true

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: ✅ 완료 기준 (Acceptance Criteria)
      description: 이 기능이 완성됐다고 판단할 수 있는 기준을 작성해주세요.
      placeholder: |
        - [ ] 모바일에서 반응형으로 홈페이지 UI 구성이 변화된다.
        - [ ] 글자 크기, 버튼 크기 등 가독성은 높게 유지된다.
        - [ ] 사이드바가 정상적으로 노출 및 닫힘
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: 💡 대안
      description: 생각해본 다른 방법이나 접근 방식이 있다면 적어주세요.
      placeholder: 예) Tailwind CSS의 Responsive Design Utility 적극 활용 고려
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: 💬 추가 내용
      description: 참고 자료, 스크린샷, 관련 이슈 등 더 공유하고 싶은 내용이 있다면 작성해주세요.
    validations:
      required: false
